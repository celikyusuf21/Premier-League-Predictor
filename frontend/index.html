
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Betting Signals</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<div class="max-w-4xl mx-auto p-10">

    <h1 class="text-4xl font-bold mb-8 text-center">
        🔥 AI Betting Prediction
    </h1>

    <div class="bg-gray-800 p-8 rounded-xl shadow-lg text-center">

        <button
        onclick="getPrediction()"
        class="bg-blue-500 hover:bg-blue-700 px-6 py-3 rounded-lg text-xl">

        Predict Match 🚀

        </button>

        <div id="result" class="mt-10 text-2xl font-semibold"></div>

    </div>

</div>

<script>

async function getPrediction(){

    const res = await fetch("http://127.0.0.1:5001/predict");
    const data = await res.json();

    document.getElementById("result").innerHTML =
        "🏠 Home Win: " + data.home_win + "%<br>" +
        "🤝 Draw: " + data.draw + "%<br>" +
        "🚀 Away Win: " + data.away_win + "%";
}

</script>

</body>
</html>
